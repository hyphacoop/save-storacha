name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Enforce lockfile policy
        run: |
          test -f package-lock.json
          git ls-files --error-unmatch package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run security and architecture regression gate
        run: npm run test:ci

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.DEPLOY_HOST != '' &&
      secrets.DEPLOY_USER != '' &&
      secrets.DEPLOY_PATH != '' &&
      secrets.DEPLOY_SSH_KEY != '' &&
      secrets.DEPLOY_KNOWN_HOSTS != ''
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure SSH known_hosts
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy pinned commit
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SERVICE: ${{ secrets.DEPLOY_SERVICE }}
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && DEPLOY_REF='$GIT_SHA' DEPLOY_SERVICE='$DEPLOY_SERVICE' DEPLOY_HEALTHCHECK_URL='$DEPLOY_HEALTHCHECK_URL' ./scripts/deploy.sh"
